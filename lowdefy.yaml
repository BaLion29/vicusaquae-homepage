lowdefy: 5.4.0
name: Lowdefy starter

connections:
  - _ref: connections/terminusdb.yaml

requests:
  - _ref: requests/terminusdb.get_tasks.yaml

auth:
  providers:
    - id: authentik
      type: AuthentikProvider
      properties:
        clientId:
          _secret: AUTHENTIK_CLIENT_ID
        clientSecret:
          _secret: AUTHENTIK_CLIENT_SECRET
        issuer:
          _secret: AUTHENTIK_ISSUER

pages:
  - id: home
    type: PageHeaderMenu
    properties:
      title: Vicus Aquae - Home
    slots:
      content:
        justify: center
        blocks:
          - id: content_card
            type: Card
            style:
              maxWidth: 800
            blocks:
              - id: content
                type: Request
                properties:
                  request: get_tasks
                slots:
                  extra:
                    blocks:
                      - id: docs_button
                        type: Button
                        properties:
                          size: large
                          title: Let's build something
                          color: "#1890ff"
